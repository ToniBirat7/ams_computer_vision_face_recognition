server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Re-resolve upstream service names via Docker's embedded DNS. Without this,
    # nginx caches each upstream IP at startup, so recreating the django/frontend
    # container (every `docker compose up -d` redeploy) would 502 until nginx restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Django static and media — served directly from shared volumes
    location /static/ {
        alias /var/www/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Django API — nginx strips the /api/django prefix, proxies directly to Django
    # This avoids Next.js rewrite trailing-slash normalization issues.
    location /api/django/ {
        set $django django:8000;
        rewrite ^/api/django/(.*)$ /$1 break;
        proxy_pass http://$django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — direct to Django (full /ws/... path preserved)
    location /ws/ {
        set $django django:8000;
        proxy_pass http://$django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Everything else — Next.js frontend
    location / {
        set $frontend frontend:3000;
        proxy_pass http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
