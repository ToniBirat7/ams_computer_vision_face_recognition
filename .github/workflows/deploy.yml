name: Deploy BCU AMS to birat.codes

on:
  workflow_dispatch: # Run manually from the Actions tab
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Verify Connection (Port 22 Check)
        run: |
          echo "Checking Tailscale status..."
          tailscale status
          echo "Testing SSH connection to ${{ secrets.VM_HOST }} on port 22..."
          nc -zv ${{ secrets.VM_HOST }} 22

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 20m
          script_stop: true
          script: |
            cd ~/BCU_AMS_CV_Project

            # Stash any local modifications so pull can proceed cleanly
            git stash push --include-untracked -m "pre-deploy-$(date +%s)" || true

            # Pull latest changes from master
            git pull --ff-only origin master

            # Build images and restart containers
            # Uses Docker layer cache — only changed layers rebuild
            docker compose build

            docker compose up -d

            # Remove dangling images to keep disk usage low
            docker image prune -f

            echo "BCU AMS deployed successfully at $(date)"
