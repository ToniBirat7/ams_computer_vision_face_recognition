name: Deploy BCU AMS to biratcodes.dev

on:
  workflow_dispatch: # Run manually from the Actions tab
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Verify Connection (Port 22 Check)
        run: |
          echo "Checking Tailscale status..."
          tailscale status
          echo "Testing SSH connection to ${{ secrets.VM_HOST }} on port 22..."
          nc -zv ${{ secrets.VM_HOST }} 22

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 20m
          script_stop: true
          script: |
            cd /srv/bcu

            git stash push --include-untracked -m "pre-deploy-$(date +%s)" || true
            git pull --ff-only origin master

            docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            docker image prune -f

            echo "BCU AMS deployed at $(date)"
