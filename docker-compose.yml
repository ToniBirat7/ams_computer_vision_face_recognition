services:
  django:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_NAME=/app/data/db.sqlite3
      # Channels uses an in-process layer (single Daphne, no cross-worker groups).
      # To scale to multiple workers, run a Redis service and set REDIS_URL —
      # channels-redis is already bundled and settings switch automatically.
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - sqlite_data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - DJANGO_INTERNAL_URL=http://django:8000
    depends_on:
      - django

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - django
      - frontend

volumes:
  static_files:
  media_files:
  sqlite_data:
